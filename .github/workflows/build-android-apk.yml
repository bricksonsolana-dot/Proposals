name: Build Devox Sales Android APK

# Runs whenever the native app source changes, or manually.
on:
  push:
    branches: [main]
    paths:
      - 'native-app/**'
      - '.github/workflows/build-android-apk.yml'
  workflow_dispatch:

permissions:
  contents: write   # so the workflow can commit the built APK back to dist/

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: native-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: native-app/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor deps
        run: npm ci

      - name: Capacitor sync
        run: npx cap sync android

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > $RUNNER_TEMP/release.keystore
            echo "DEVOX_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> $GITHUB_ENV
            echo "DEVOX_KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "DEVOX_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> $GITHUB_ENV
            echo "DEVOX_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> $GITHUB_ENV
            echo "Keystore configured for signing"
          else
            echo "WARNING: ANDROID_KEYSTORE_BASE64 secret not set — APK will not be signed"
          fi

      - name: Build release APK
        working-directory: native-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Locate built APK
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk -name '*.apk' | head -1)
          echo "Built APK: $APK"
          ls -la "$APK"
          echo "apk_path=$APK" >> $GITHUB_OUTPUT

      - name: Verify APK is signed
        run: |
          APK="${{ steps.apk.outputs.apk_path }}"
          if [ -z "$DEVOX_KEYSTORE_PATH" ]; then
            echo "::warning::No keystore was provided — APK is unsigned and won't install."
            echo "Set ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD,"
            echo "ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD as repo secrets."
          else
            echo "APK signed at build time."
          fi

      - name: Copy APK into crm/dist
        run: |
          cp "${{ steps.apk.outputs.apk_path }}" \
            ../crm/dist/DevoxSales.apk
          ls -la ../crm/dist/

      - name: Commit APK back to repo
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          cd ..
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add crm/dist/DevoxSales.apk
          if git diff --cached --quiet; then
            echo "No APK changes"
          else
            git commit -m "ci: rebuild Devox Sales native APK"
            git push
          fi

      - name: Upload as workflow artifact too
        uses: actions/upload-artifact@v4
        with:
          name: DevoxSales-apk
          path: native-app/android/app/build/outputs/apk/release/*.apk
