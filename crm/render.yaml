services:
  - type: web
    name: devox-crm
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 2 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: DATABASE_URL
        sync: false       # set manually in Render dashboard (secret)
      - key: SYNC_TOKEN
        sync: false       # set manually in Render dashboard (secret)
      - key: SECRET_KEY
        generateValue: true   # Render auto-generates a random key
      - key: PYTHON_VERSION
        value: 3.12.0
